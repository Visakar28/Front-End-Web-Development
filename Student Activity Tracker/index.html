<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Activity Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container py-4">

    <h2 class="text-center mb-4">Student Activity Tracker</h2>

    <div class="row g-3 mb-4">

        <div class="col-md-3">
            <div class="card stat-card bg-primary text-white">
                <div class="card-body">
                    <h5>Total</h5>
                    <h2 id="total">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card stat-card bg-success text-white">
                <div class="card-body">
                    <h5>Completed</h5>
                    <h2 id="completed">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card stat-card bg-warning">
                <div class="card-body">
                    <h5>Pending</h5>
                    <h2 id="pending">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <button class="btn btn-dark w-100 h-100" id="themeBtn">
                Toggle Theme
            </button>
        </div>

    </div>

    <div class="card mb-4">
        <div class="card-body">

            <form id="activityForm">

                <div class="row g-3">

                    <div class="col-md-3">
                        <input class="form-control" id="activity" placeholder="Activity" required>
                    </div>

                    <div class="col-md-3">
                        <input class="form-control" id="subject" placeholder="Subject" required>
                    </div>

                    <div class="col-md-2">
                        <input type="date" class="form-control" id="date" required>
                    </div>

                    <div class="col-md-2">
                        <select class="form-select" id="status">
                            <option>Pending</option>
                            <option>Completed</option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <button class="btn btn-primary w-100">Add</button>
                    </div>

                </div>

            </form>

        </div>
    </div>

    <div class="row mb-3">

        <div class="col-md-6">
            <input id="search" class="form-control" placeholder="Search">
        </div>

        <div class="col-md-6">
            <select id="filter" class="form-select">
                <option value="All">All</option>
                <option value="Pending">Pending</option>
                <option value="Completed">Completed</option>
            </select>
        </div>

    </div>

    <table class="table table-hover table-bordered align-middle">

        <thead class="table-dark">
            <tr>
                <th>Activity</th>
                <th>Subject</th>
                <th>Date</th>
                <th>Status</th>
                <th width="150">Action</th>
            </tr>
        </thead>

        <tbody id="tableBody"></tbody>

    </table>

</div>

<script src="script.js"></script>
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>

</body>
</html>
